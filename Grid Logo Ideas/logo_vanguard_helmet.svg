<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="256" height="256" fill="#000000"/>
  
  <!-- Helmet Crown Silhouette -->
  <path d="M56 120C56 80 88 48 128 48C168 48 200 80 200 120V140H56V120Z" stroke="#2563EB" stroke-width="2" stroke-opacity="0.5"/>
  
