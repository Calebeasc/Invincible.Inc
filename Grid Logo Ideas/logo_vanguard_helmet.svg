  <circle cx="48" cy="130" r="4" fill="#60A5FA" fill-opacity="0.3"/>
  
  <circle cx="208" cy="130" r="12" stroke="#60A5FA" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="208" cy="130" r="4" fill="#60A5FA" fill-opacity="0.3"/>

  <!-- The Central Vanguard Triangle (Glowing) -->
  <path d="M128 96L148 132H108L128 96Z" fill="#EF4444">
    <animate attributeName="fill-opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite" />
